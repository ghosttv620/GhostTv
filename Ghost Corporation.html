<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghost Corp · প্রিমিয়াম ডাউনলোড</title>
    <!-- Font Awesome 6 Free -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== GLOBAL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #05070e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 12px 16px 20px;
            margin: 0;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0d18; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #4a6cf7, #6d8cff); border-radius: 10px; }

        .main-wrapper {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* ===== CARD BASE ===== */
        .card {
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.02);
            width: 100%;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            height: 3px;
            background: linear-gradient(90deg, #4a6cf7, #7a9cff, #4a6cf7);
            background-size: 200% 100%;
            border-radius: 28px 28px 0 0;
            opacity: 0.6;
            animation: shimmerLine 3s linear infinite;
        }
        @keyframes shimmerLine {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .card .card-inner {
            position: relative;
            z-index: 2;
            padding: 16px 20px 14px;
        }

        /* ===== HEADER CARD ===== */
        .header-card {
            border-radius: 24px;
            padding: 0;
            background: rgba(255, 255, 255, 0.015);
        }
        .header-card .card-inner {
            padding: 12px 16px 10px;
            text-align: center;
        }
        .header-card .brand h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff, #7a9cff, #4a6cf7, #ffffff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 5s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(74, 108, 247, 0.10));
            line-height: 1.2;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .header-card .sub {
            font-size: 0.9rem;
            color: #7a8aaa;
            margin-top: 2px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .header-card .sub i {
            color: #4a6cf7;
            -webkit-text-fill-color: #4a6cf7;
        }
        .header-card .sub .highlight {
            color: #7a9cff;
            font-weight: 600;
            border-bottom: 1.5px solid rgba(74, 108, 247, 0.2);
            padding-bottom: 1px;
            -webkit-text-fill-color: #7a9cff;
        }
        .header-card .tagline {
            margin-top: 4px;
            font-size: 0.6rem;
            color: #2e3a5a;
            font-family: 'Courier New', monospace;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .header-card .tagline .dot {
            display: inline-block;
            width: 5px;
            height: 5px;
            background: #4a6cf7;
            border-radius: 50%;
            animation: pulseDot 1.5s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ===== ডাউনলোড গ্রিড ===== */
        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            padding: 20px 22px 18px;
        }

        /* ===== প্রতিটি কার্ডের জন্য আলাদা ব্যাকগ্রাউন্ড + ঢেউ ===== */
        .dl-card {
            position: relative;
            border-radius: 24px;
            padding: 18px 16px 16px;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
            display: flex;
            flex-direction: column;
            gap: 4px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 180px;
        }
        .dl-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(74, 108, 247, 0.2);
            box-shadow: 0 16px 50px rgba(74, 108, 247, 0.10);
        }

        /* ===== ওয়েভ ব্যাকগ্রাউন্ড (প্রতি কার্ডে) ===== */
        .dl-card .card-wave {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            border-radius: 24px;
            overflow: hidden;
            pointer-events: none;
        }
        .dl-card .card-wave canvas {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        .dl-card .card-wave .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            opacity: 0.15;
        }

        /* প্রতিটি কার্ডের জন্য আলাদা ব্যাকগ্রাউন্ড কালার (অরব + গ্রেডিয়েন্ট) */
        .dl-card:nth-child(1) {
            background: linear-gradient(160deg, #0a1628, #0d1a3a);
        }
        .dl-card:nth-child(1) .card-wave .orb {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(74, 108, 247, 0.20), transparent 70%);
            bottom: -40px;
            right: -40px;
            animation: orbFloat1 10s ease-in-out infinite;
        }
        .dl-card:nth-child(2) {
            background: linear-gradient(160deg, #1a0a28, #2a0d3a);
        }
        .dl-card:nth-child(2) .card-wave .orb {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(162, 92, 247, 0.20), transparent 70%);
            top: -40px;
            left: -40px;
            animation: orbFloat2 12s ease-in-out infinite;
        }
        .dl-card:nth-child(3) {
            background: linear-gradient(160deg, #0a1a20, #0d2a30);
        }
        .dl-card:nth-child(3) .card-wave .orb {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0, 200, 150, 0.15), transparent 70%);
            bottom: -30px;
            left: 30px;
            animation: orbFloat3 14s ease-in-out infinite;
        }
        .dl-card:nth-child(4) {
            background: linear-gradient(160deg, #1a0a18, #2a0d22);
        }
        .dl-card:nth-child(4) .card-wave .orb {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(247, 92, 150, 0.15), transparent 70%);
            top: -30px;
            right: 20px;
            animation: orbFloat1 11s ease-in-out infinite;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-20px, -20px) scale(1.1); }
        }
        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, 20px) scale(1.1); }
        }
        @keyframes orbFloat3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-15px, 15px) scale(1.1); }
        }

        /* ===== কার্ড কন্টেন্ট (z-index) ===== */
        .dl-card .card-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .dl-card .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2px;
        }
        .dl-card .card-header i {
            font-size: 1.6rem;
            filter: drop-shadow(0 0 20px rgba(74, 108, 247, 0.15));
        }
        .dl-card .card-header .file-name-sm {
            font-size: 1rem;
            font-weight: 700;
            color: #f0f4ff;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
            line-height: 1.2;
            flex: 1;
        }
        .dl-card .file-desc-sm {
            font-size: 0.75rem;
            color: #8a9bc0;
            line-height: 1.3;
            margin-bottom: 4px;
        }
        .dl-card .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px;
            font-size: 0.7rem;
            color: #6a7fa0;
            margin: 2px 0 6px;
        }
        .dl-card .meta-row span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .dl-card .meta-row i {
            color: #4a6cf7;
            font-size: 0.65rem;
            width: 14px;
            text-align: center;
        }
        .dl-card .meta-row .badge-pc {
            background: rgba(74, 108, 247, 0.08);
            color: #7a9cff;
            padding: 0 8px;
            border-radius: 12px;
            font-size: 0.6rem;
            font-weight: 600;
            border: 1px solid rgba(74, 108, 247, 0.06);
            line-height: 1.6;
        }
        .dl-card .meta-row .badge-safe {
            background: rgba(0, 200, 83, 0.08);
            color: #00c853;
            padding: 0 8px;
            border-radius: 12px;
            font-size: 0.6rem;
            font-weight: 600;
            border: 1px solid rgba(0, 200, 83, 0.06);
            line-height: 1.6;
        }

        /* ===== প্রগ্রেস ===== */
        .progress-wrapper-sm {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            overflow: hidden;
            margin: 4px 0 2px;
            opacity: 0;
            transition: opacity 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }
        .progress-wrapper-sm.active {
            opacity: 1;
        }
        .progress-bar-sm {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a6cf7, #7a9cff, #4a6cf7);
            background-size: 200% 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
            animation: shimmer 1.8s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .progress-text-sm {
            font-size: 0.55rem;
            color: #5a6a8a;
            text-align: right;
            margin-top: 1px;
            opacity: 0;
            transition: 0.3s;
            font-weight: 500;
            letter-spacing: 0.2px;
            height: 12px;
        }
        .progress-text-sm.active {
            opacity: 1;
        }
        .progress-text-sm .speed {
            color: #7a9cff;
            font-weight: 600;
        }

        /* ===== ডাউনলোড বাটন ===== */
        .dl-btn-sm {
            background: linear-gradient(135deg, #4a6cf7, #6d8cff);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: #fff;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(74, 108, 247, 0.15);
            margin-top: 4px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        .dl-btn-sm::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.06), transparent 60%);
            opacity: 0;
            transition: 0.4s;
        }
        .dl-btn-sm:hover::before {
            opacity: 1;
        }
        .dl-btn-sm:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(74, 108, 247, 0.25);
        }
        .dl-btn-sm:active {
            transform: scale(0.95);
        }
        .dl-btn-sm:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .dl-btn-sm i {
            font-size: 0.8rem;
        }
        .dl-count-sm {
            font-size: 0.65rem;
            color: #5a6a8a;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
        }
        .dl-count-sm i {
            color: #f1c40f;
            font-size: 0.7rem;
        }
        .dl-count-sm .check {
            color: #00c853;
        }

        /* ===== FOOTER CARD ===== */
        .footer-card {
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.015);
            margin-top: 4px;
        }
        .footer-card .card-inner {
            padding: 14px 20px 12px;
            text-align: center;
        }
        .footer-card .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .footer-card .credit {
            font-size: 0.75rem;
            color: #5a6a8a;
            letter-spacing: 0.3px;
        }
        .footer-card .credit i {
            color: #4a6cf7;
            margin: 0 3px;
        }
        .footer-card .credit .heart {
            color: #ff6b6b;
        }
        .footer-card .social-links {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .footer-card .social-links a {
            color: #3a4a6a;
            font-size: 1rem;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-decoration: none;
        }
        .footer-card .social-links a:hover {
            color: #7a9cff;
            background: rgba(74, 108, 247, 0.06);
            border-color: rgba(74, 108, 247, 0.10);
            transform: translateY(-2px);
        }
        .footer-card .footer-extra {
            font-size: 0.55rem;
            color: #2a3250;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 320px;
            width: 100%;
        }
        .toast {
            background: rgba(12, 18, 38, 0.97);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(74, 108, 247, 0.10);
            padding: 10px 16px;
            border-radius: 16px;
            color: #eef2f9;
            font-weight: 500;
            font-size: 0.8rem;
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastIn 0.4s ease;
            border-left: 4px solid #4a6cf7;
            transition: 0.3s;
        }
        @keyframes toastIn {
            0% { opacity: 0; transform: translateX(30px) scale(0.95); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        .toast i {
            font-size: 1rem;
            flex-shrink: 0;
        }
        .toast .toast-icon-success { color: #00c853; }
        .toast .toast-icon-error { color: #ff6b6b; }
        .toast .toast-icon-info { color: #4a6cf7; }
        .toast .toast-icon-warning { color: #f1c40f; }
        .toast .toast-msg { flex: 1; }
        .toast .toast-time {
            font-size: 0.5rem;
            color: #3a4260;
            margin-left: 4px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .download-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 14px;
                padding: 16px;
            }
            .dl-card .card-header i { font-size: 1.3rem; }
            .dl-card .card-header .file-name-sm { font-size: 0.9rem; }
        }
        @media (max-width: 480px) {
            body { padding: 8px 10px 16px; }
            .header-card .brand h1 { font-size: 1.6rem; }
            .download-grid {
                grid-template-columns: 1fr;
                gap: 14px;
                padding: 14px;
            }
            .card .card-inner { padding: 12px 14px 10px; }
            .dl-card { padding: 14px 12px 12px; min-height: 160px; }
            .toast-container { right: 12px; bottom: 12px; left: 12px; max-width: 100%; }
            .toast { padding: 8px 14px; font-size: 0.75rem; border-radius: 12px; }
            .footer-card .social-links a { width: 28px; height: 28px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">

    <!-- ===== HEADER CARD ===== -->
    <div class="card header-card">

                <h1>Ghost Corporation</h1>

                </div>
            </div>
        </div>
    </div>

</div>

<!-- ===== TOAST ===== -->
<div class="toast-container" id="toastContainer"></div>

<script>

            {
                id: 4,
                name: 'মিডিয়া প্লেয়ার HD',
                desc: '৪কে ভিডিও প্লেয়ার, লাইটওয়েট',
                size: '8.2',
                icon: 'fa-film',
                iconColor: '#ff6b6b',
                type: '.exe',
                link: 'https://www.example.com/download/player.exe',
                downloads: 2560,
                pc: true,
                safe: true,
            },
        ];

        // ================================================================
        //   DOM REFS
        // ================================================================
        const grid = document.getElementById('downloadGrid');

        // ================================================================
        //   রেন্ডার কার্ড
        // ================================================================
        function renderCards() {
            grid.innerHTML = files.map((f, index) => {
                const badgePc = f.pc ? '<span class="badge-pc">পিসির জন্য</span>' : '';
                const badgeSafe = f.safe ? '<span class="badge-safe">ভাইরাস মুক্ত</span>' : '';
                // প্রতিটি কার্ডের জন্য আলাদা ক্লাস (nth-child এর জন্য)
                return `
                        <div class="dl-card" data-id="${f.id}" style="animation-delay: ${index * 0.1}s;">
                            <!-- ওয়েভ ব্যাকগ্রাউন্ড (প্রতি কার্ডে) -->
                            <div class="card-wave">
                                <div class="orb"></div>
                                <canvas class="wave-canvas" data-id="${f.id}"></canvas>
                            </div>
                            <div class="card-content">
                                <div class="card-header">
                                    <i class="fab ${f.icon}" style="color:${f.iconColor};"></i>
                                    <span class="file-name-sm">${f.name}</span>
                                </div>
                                <div class="file-desc-sm">${f.desc}</div>
                                <div class="meta-row">
                                    <span><i class="fas fa-weight-hanging"></i> ${f.size} MB</span>
                                    ${badgePc}
                                    ${badgeSafe}
                                    <span><i class="fas fa-download" style="color:#4a6cf7;"></i> <span class="dl-count-num">${f.downloads.toLocaleString()}</span></span>
                                </div>
                                <div class="progress-wrapper-sm" id="pWrap-${f.id}">
                                    <div class="progress-bar-sm" id="pBar-${f.id}"></div>
                                </div>
                                <div class="progress-text-sm" id="pText-${f.id}">
                                    <span class="speed" id="speed-${f.id}">0</span> KB/s · <span id="pct-${f.id}">0</span>%
                                </div>
                                <button class="dl-btn-sm" data-id="${f.id}" data-link="${f.link}" data-name="${f.name}">
                                    <i class="fas fa-download"></i> ডাউনলোড
                                </button>
                                <div class="dl-count-sm">
                                    <i class="fas fa-check-circle check"></i> ফ্রি
                                    <span style="margin-left:auto; color:#5a6a8a;"><i class="fas fa-star" style="color:#f1c40f;"></i> প্রিমিয়াম</span>
                                </div>
                            </div>
                        </div>
                    `;
            }).join('');

            // ===== ওয়েভ এনিমেশন শুরু (প্রতি কার্ডের জন্য) =====
            document.querySelectorAll('.dl-card').forEach(card => {
                const canvas = card.querySelector('.wave-canvas');
                if (canvas) {
                    initCardWave(canvas);
                }
            });

            // ===== ডাউনলোড বাটনে ইভেন্ট =====
            document.querySelectorAll('.dl-btn-sm').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.disabled) return;
                    const id = parseInt(this.dataset.id);
                    const link = this.dataset.link;
                    const name = this.dataset.name;
                    startDownload(id, link, name, this);
                });
            });

            // ===== কার্ডে ক্লিক = ঢেউ বাড়ে =====
            document.querySelectorAll('.dl-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    if (e.target.closest('.dl-btn-sm')) return;
                    // এই কার্ডের ঢেউ বাড়ানো
                    const canvas = this.querySelector('.wave-canvas');
                    if (canvas) {
                        const waveData = canvas._waveData;
                        if (waveData) {
                            waveData.amplitude = 40;
                            setTimeout(() => {
                                waveData.amplitude = 20;
                            }, 1000);
                        }
                    }
                    showToast('🌊 ঢেউ বেড়েছে!', 'info');
                });
            });
        }

        // ================================================================
        //   🌊 ওয়েভ ক্যানভাস (প্রতি কার্ডের জন্য)
        // ================================================================
        function initCardWave(canvas) {
            const ctx = canvas.getContext('2d');
            let w, h;

            function resize() {
                const rect = canvas.parentElement.getBoundingClientRect();
                w = canvas.width = rect.width;
                h = canvas.height = rect.height;
            }
            resize();
            window.addEventListener('resize', resize);

            let time = 0;
            let amplitude = 20;

            // স্টোর করুন
            canvas._waveData = { amplitude: amplitude };

            const waves = [
                { amp: 12, freq: 0.025, speed: 0.6, phase: 0, color: 'rgba(255,255,255,0.06)' },
                { amp: 8, freq: 0.035, speed: 0.8, phase: 1.2, color: 'rgba(255,255,255,0.04)' },
                { amp: 5, freq: 0.045, speed: 0.4, phase: 2.8, color: 'rgba(255,255,255,0.03)' },
            ];

            function draw() {
                ctx.clearRect(0, 0, w, h);

                // গ্রেডিয়েন্ট ওভারলে
                const grad = ctx.createLinearGradient(0, h * 0.5, 0, h);
                grad.addColorStop(0, 'rgba(0,0,0,0)');
                grad.addColorStop(1, 'rgba(0,0,0,0.2)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);

                const currentAmp = canvas._waveData ? canvas._waveData.amplitude : amplitude;

                waves.forEach((wave) => {
                    ctx.beginPath();
                    ctx.moveTo(0, h);
                    const amp = wave.amp * (currentAmp / 20);
                    for (let x = 0; x <= w; x += 1) {
                        const y = h - 10 - amp * Math.sin(x * wave.freq + time * wave.speed + wave.phase) -
                                  amp * 0.3 * Math.sin(x * 0.01 + time * 0.2 + wave.phase * 1.5);
                        ctx.lineTo(x, y);
                    }
                    ctx.lineTo(w, h);
                    ctx.closePath();
                    ctx.fillStyle = wave.color;
                    ctx.fill();
                });

                time += 0.02;
                requestAnimationFrame(draw);
            }

            draw();

            // রেসাইজ রি-অ্যাটাচ
            const resizeObserver = new ResizeObserver(() => {
                resize();
            });
            resizeObserver.observe(canvas.parentElement);
        }

        // ================================================================
        //   ডাউনলোড ফাংশন
        // ================================================================
        function startDownload(id, link, name, btn) {
            const pWrap = document.getElementById(`pWrap-${id}`);
            const pBar = document.getElementById(`pBar-${id}`);
            const pText = document.getElementById(`pText-${id}`);
            const speedSpan = document.getElementById(`speed-${id}`);
            const pctSpan = document.getElementById(`pct-${id}`);

            if (!pWrap || !pBar) return;

            btn.disabled = true;
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            pWrap.classList.add('active');
            pText.classList.add('active');
            pText.innerHTML = '<span class="speed">0</span> KB/s · <span id="pct-' + id + '">0</span>%';

            let progress = 0;
            let totalSpeed = 0;
            let stepCount = 0;

            // কার্ডের ঢেউ বাড়ানো
            const card = btn.closest('.dl-card');
            const canvas = card.querySelector('.wave-canvas');
            if (canvas && canvas._waveData) {
                canvas._waveData.amplitude = 40;
            }

            const interval = setInterval(() => {
                const step = Math.random() * 5 + 2;
                progress = Math.min(progress + step, 100);
                pBar.style.width = progress + '%';
                const speed = Math.floor(Math.random() * 600 + 150);
                totalSpeed += speed;
                stepCount++;
                const avgSpeed = Math.floor(totalSpeed / stepCount);
                if (speedSpan) speedSpan.textContent = avgSpeed;
                if (pctSpan) pctSpan.textContent = Math.round(progress);

                if (progress >= 100) {
                    clearInterval(interval);
                    pText.innerHTML = '✅ সম্পন্ন!';
                    pBar.style.width = '100%';

                    // ডাউনলোড কাউন্ট বাড়ান
                    const countSpan = card.querySelector('.dl-count-num');
                    if (countSpan) {
                        let current = parseInt(countSpan.textContent.replace(/,/g, ''));
                        if (!isNaN(current)) {
                            current += 1;
                            countSpan.textContent = current.toLocaleString();
                            const file = files.find(f => f.id === id);
                            if (file) {
                                file.downloads = current;
                            }
                        }
                    }

                    showToast(`📥 "${name}" ডাউনলোড সম্পন্ন!`, 'success');

                    setTimeout(() => {
                        btn.innerHTML = originalHtml;
                        btn.disabled = false;
                        setTimeout(() => {
                            pWrap.classList.remove('active');
                            pText.classList.remove('active');
                            pBar.style.width = '0%';
                            if (canvas && canvas._waveData) {
                                canvas._waveData.amplitude = 20;
                            }
                        }, 1600);
                    }, 500);

                    if (link && link.startsWith('http')) {
                        window.open(link, '_blank');
                    } else {
                        showToast('⚠️ ডেমো লিংক', 'warning');
                    }
                }
            }, 140);
        }

        // ================================================================
        //   TOAST
        // ================================================================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            if (!container) return;

            const oldToasts = container.querySelectorAll('.toast');
            oldToasts.forEach(t => t.remove());

            const icons = {
                success: '<i class="fas fa-check-circle toast-icon-success"></i>',
                error: '<i class="fas fa-exclamation-circle toast-icon-error"></i>',
                warning: '<i class="fas fa-exclamation-triangle toast-icon-warning"></i>',
                info: '<i class="fas fa-info-circle toast-icon-info"></i>'
            };

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                    ${icons[type] || icons.info}
                    <span class="toast-msg">${message}</span>
                    <span class="toast-time">${new Date().toLocaleTimeString()}</span>
                `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                toast.style.transition = '0.3s ease';
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        // ================================================================
        //   INIT
        // ================================================================
        renderCards();

        setTimeout(() => {
            showToast('🌊 প্রতিটি কার্ডে আলাদা ব্যাকগ্রাউন্ড + ঢেউ', 'info');
        }, 600);

        console.log('🌊 Ghost Corporation · আলাদা ব্যাকগ্রাউন্ড + ঢেউ');
        console.log('📁 মোট ফাইল:', files.length);

    })();
</script>

</body>
</html>

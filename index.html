    <!-- ===== PWA Service Worker + Install Logic ===== -->
    <script>
        // ============================================================
        // 🚀 PWA: Service Worker Registration
        // ============================================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js')
                    .then(function(registration) {
                        console.log('✅ Ghost Tv: Service Worker registered!');
                    })
                    .catch(function(error) {
                        console.log('❌ Ghost Tv: SW registration failed:', error);
                    });
            });
        }

        // ============================================================
        // 📱 PWA: Install Banner Logic
        // ============================================================
        let deferredPrompt = null;
        const installBanner = document.getElementById('pwa-install-banner');
        const installBtn = document.getElementById('pwaInstallBtn');
        const closeBtn = document.getElementById('pwaCloseBtn');

        // Listen for beforeinstallprompt event
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            // Show custom install banner
            installBanner.classList.add('show');
            console.log('📱 Ghost Tv: Install prompt available!');
        });

        // Install button click
        installBtn.addEventListener('click', function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function(choiceResult) {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('✅ Ghost Tv: App installed successfully!');
                        installBanner.classList.remove('show');
                    } else {
                        console.log('❌ Ghost Tv: Installation declined');
                    }
                    deferredPrompt = null;
                });
            } else {
                // Fallback: Just hide the banner
                installBanner.classList.remove('show');
            }
        });

        // Close banner
        closeBtn.addEventListener('click', function() {
            installBanner.classList.remove('show');
            // Remember that user closed it (session only)
            sessionStorage.setItem('ghost_pwa_banner_closed', 'true');
        });

        // Don't show banner if user closed it before in this session
        if (sessionStorage.getItem('ghost_pwa_banner_closed') === 'true') {
            installBanner.classList.remove('show');
        }

        // Check if app is already installed (standalone mode)
        if (window.matchMedia('(display-mode: standalone)').matches) {
            console.log('📱 Ghost Tv: Running as standalone app!');
            installBanner.classList.remove('show');
        }

        // ============================================================

        // ============================================================

        console.log('👻 Ghost Tv PWA Loaded Successfully!');
    </script>

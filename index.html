    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* ===== PWA Install Banner (Popup Style) ===== */
        #installBanner {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            width: 92%;
            max-width: 400px;
            background: rgba(20, 28, 45, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 16px 18px;
            z-index: 9999999;
            display: none;
            align-items: center;
            gap: 14px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
            opacity: 0;
        }
        #installBanner.show {
            display: flex;
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        #installBanner .icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #installBanner .text {
            flex: 1;
            color: #fff;
        }
        #installBanner .text .title {
            font-weight: 700;
            font-size: 15px;
            color: #e50914;
        }
        #installBanner .text .sub {
            font-size: 12px;
            color: #9aa3b5;
            margin-top: 2px;
        }
        #installBanner .btn-install {
            background: #e50914;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        #installBanner .btn-install:hover {
            transform: scale(1.05);
            background: #b8070f;
        }
        #installBanner .btn-close {
            background: rgba(255, 255, 255, 0.06);
            color: #8a94a6;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }
        #installBanner .btn-close:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        @media (max-width: 480px) {
            #installBanner {
                bottom: 20px;
                padding: 12px 14px;
                gap: 10px;
                width: 95%;
            }
            #installBanner .icon {
                width: 40px;
                height: 40px;
            }
            #installBanner .text .title {
                font-size: 13px;
            }
            #installBanner .text .sub {
                font-size: 10px;
            }
            #installBanner .btn-install {
                padding: 6px 14px;
                font-size: 11px;
            }
        }
    </style>
</head>

    <!-- ===== PWA Install Banner (Popup) ===== -->
    <div id="installBanner">
        <img class="icon" src="https://github.com/ghosttv620/GhostTv/releases/download/Ghost_Tv/Ghost.Tv.Logo.jpg" alt="Ghost Tv">
        <div class="text">
            <div class="title">👻 Ghost Tv</div>
            <div class="sub">Watch Live TV & Movies</div>
        </div>
        <button class="btn-install" id="installBtn">📲 Install</button>
        <button class="btn-close" id="closeBannerBtn">✕</button>
    </div>

    <!-- ========================================================== -->
    <!-- ✅ PWA: Service Worker + Install Logic                      -->
    <!-- ========================================================== -->
    <script>
        // ============================================
        // 1. Service Worker Register
        // ============================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js')
                    .then(function(reg) {
                        console.log('✅ Service Worker registered!');
                    })
                    .catch(function(err) {
                        console.log('❌ SW registration failed:', err);
                    });
            });
        }

        // ============================================
        // 2. Install Banner Logic
        // ============================================
        let deferredPrompt = null;
        const banner = document.getElementById('installBanner');
        const installBtn = document.getElementById('installBtn');
        const closeBtn = document.getElementById('closeBannerBtn');

        // 👇 ব্রাউজার যখন Install প্রম্পট দিতে পারে
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;

            // ব্যানার দেখান (যদি আগে বন্ধ না করা থাকে)
            if (!sessionStorage.getItem('ghost_banner_closed')) {
                banner.classList.add('show');
            }
            console.log('📱 Install prompt ready!');
        });

        // 👇 Install বাটন ক্লিক করলে
        installBtn.addEventListener('click', function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function(result) {
                    if (result.outcome === 'accepted') {
                        console.log('✅ Ghost Tv installed!');
                        banner.classList.remove('show');
                    } else {
                        console.log('❌ Installation declined');
                    }
                    deferredPrompt = null;
                });
            } else {
                // Fallback: যদি deferredPrompt না থাকে
                banner.classList.remove('show');
            }
        });

        // 👇 Close বাটন ক্লিক করলে
        closeBtn.addEventListener('click', function() {
            banner.classList.remove('show');
            sessionStorage.setItem('ghost_banner_closed', 'true');
        });

        // 👇 ইন্সটল হয়ে গেলে
        window.addEventListener('appinstalled', function() {
            console.log('✅ Ghost Tv installed as PWA!');
            banner.classList.remove('show');
            deferredPrompt = null;
        });

        // 👇 ইতিমধ্যে Standalone মোডে আছে কিনা
        if (window.matchMedia('(display-mode: standalone)').matches) {
            console.log('📱 Ghost Tv running as standalone app!');
            banner.classList.remove('show');
        }

        // 👇 ৫ সেকেন্ড পরেও যদি ব্যানার না দেখায়, তাহলে নিজে থেকে দেখান
        setTimeout(function() {
            if (deferredPrompt && !sessionStorage.getItem('ghost_banner_closed')) {
                banner.classList.add('show');
            }
        }, 3000);
    </script>
